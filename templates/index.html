<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioethanol Industrial Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-weight: bold; font-size: 14px; color: #333; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #27ae60; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .results-section { margin-top: 30px; display: none; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #e8f6ef; padding: 15px; border-radius: 8px; }
        .chart-box { margin-top: 30px; height: 400px; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align: center; color: #2c3e50;">Bioethanol Plant Simulator</h2>
    <div class="grid">
        <div><label>Feedstock Rate (ton/day)</label><input type="number" id="feed_rate" value="100"></div>
        <div><label>Pretreatment Efficiency (0.5-1.0)</label><input type="number" id="pretreat_eff" step="0.01" value="0.9"></div>
        <div><label>Hydrolysis Efficiency (0.5-1.0)</label><input type="number" id="hydroly_eff" step="0.01" value="0.8"></div>
        <div><label>Fermentation Efficiency (0.5-1.0)</label><input type="number" id="ferment_eff" step="0.01" value="0.9"></div>
        <div><label>Ethanol Price ($/L)</label><input type="number" id="eth_price" step="0.01" value="0.8"></div>
        <div><label>Feedstock Cost ($/ton)</label><input type="number" id="feed_cost" value="50"></div>
        <div><label>Enzyme Cost ($/kg sugar)</label><input type="number" id="enzyme_cost" step="0.01" value="0.1"></div>
        <div><label>Annual Operating Cost ($)</label><input type="number" id="annual_operating_cost" value="1000000"></div>
    </div>
    <button onclick="calculate()">Run Simulation & Generate Graphs</button>

    <div id="resultsSection" class="results-section">
        <h3>=== Simulation Results ===</h3>
        <div class="stats" id="statsOutput"></div>
        
        <div class="chart-box"><canvas id="effChart"></canvas></div>
        <div class="chart-box"><canvas id="feedEthChart"></canvas></div>
        <div class="chart-box"><canvas id="feedProfitChart"></canvas></div>
    </div>
</div>

<script>
let charts = {};

async function calculate() {
    const data = {};
    document.querySelectorAll('input').forEach(i => data[i.id] = i.value);

    const response = await fetch('/simulate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const res = await response.json();

    document.getElementById('resultsSection').style.display = 'block';
    
    // عرض الأرقام
    const s = res.main;
    document.getElementById('statsOutput').innerHTML = `
        <div>Dry Biomass: <b>${s.dry_biomass.toLocaleString()} ton/day</b></div>
        <div>Total Sugars: <b>${s.total_sugar_kg.toLocaleString()} kg/day</b></div>
        <div>Ethanol Production: <b>${s.ethanol_L.toLocaleString()} L/day</b></div>
        <div>Daily Profit: <b style="color:green">$${s.daily_profit.toLocaleString()}</b></div>
    `;

    // رسم البياني 1: Efficiencies
    renderChart('effChart', res.sens_eff.labels, [
        {label: 'Pretreatment', data: res.sens_eff.pretreat, borderColor: 'red'},
        {label: 'Hydrolysis', data: res.sens_eff.hydroly, borderColor: 'blue'},
        {label: 'Fermentation', data: res.sens_eff.ferment, borderColor: 'green'}
    ], 'Efficiency (%)', 'Daily Profit ($)');

    // رسم البياني 2: Feed vs Ethanol
    renderChart('feedEthChart', res.sens_feed.labels, [
        {label: 'Ethanol Production', data: res.sens_feed.ethanol, borderColor: 'blue'}
    ], 'Feedstock Rate (ton/day)', 'Ethanol (L/day)');

    // رسم البياني 3: Feed vs Profit
    renderChart('feedProfitChart', res.sens_feed.labels, [
        {label: 'Daily Profit', data: res.sens_feed.profit, borderColor: 'orange'}
    ], 'Feedstock Rate (ton/day)', 'Daily Profit ($)');
}

function renderChart(id, labels, datasets, xTitle, yTitle) {
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: labels.map(l => l.toFixed(1)), datasets: datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { title: { display: true, text: xTitle } },
                y: { title: { display: true, text: yTitle } }
            }
        }
    });
}
</script>
</body>
</html>
