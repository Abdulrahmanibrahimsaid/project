<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioethanol NREL Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 950px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .header { border-bottom: 2px solid #1a73e8; margin-bottom: 20px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #5f6368; }
        input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; padding: 14px; border: none; border-radius: 6px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1765cc; }
        
        #results { margin-top: 30px; display: none; }
        .results-box { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; background: #fff; border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; }
        .result-group h4 { margin: 0 0 10px 0; color: #1a73e8; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .result-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px dotted #eee; }
        .profit-highlight { grid-column: span 2; background: #e6f4ea; padding: 15px; border-radius: 6px; text-align: center; color: #1e8e3e; font-size: 1.2em; font-weight: bold; }
        
        .chart-section { margin-top: 40px; height: 350px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>NREL-Standard Bioethanol Simulator</h2></div>
    
    <div class="grid">
        <div><label>Feed rate (ton/day)</label><input type="number" id="feed_rate" value="2000"></div>
        <div><label>Pretreatment Efficiency</label><input type="number" id="pretreat_eff" step="0.01" value="0.9"></div>
        <div><label>Hydrolysis Efficiency</label><input type="number" id="hydroly_eff" step="0.01" value="0.85"></div>
        <div><label>Fermentation Efficiency</label><input type="number" id="ferment_eff" step="0.01" value="0.95"></div>
        <div><label>Ethanol Price ($/L)</label><input type="number" id="eth_price" step="0.01" value="0.75"></div>
        <div><label>Feedstock Cost ($/ton)</label><input type="number" id="feed_cost" value="60"></div>
        <div><label>Enzyme Cost ($/kg sugar)</label><input type="number" id="enzyme_cost" step="0.01" value="0.05"></div>
        <div><label>Annual Operating Cost ($)</label><input type="number" id="annual_operating_cost" value="15000000"></div>
    </div>

    <button onclick="runSimulation()">Execute Industrial Analysis</button>

    <div id="results">
        <div class="results-box">
            <div class="result-group">
                <h4>Process Metrics</h4>
                <div class="result-item"><span>Dry Biomass:</span> <span id="out_dry"></span></div>
                <div class="result-item"><span>Total Sugar (Monomers):</span> <span id="out_sugar"></span></div>
                <div class="result-item"><span>Fermentable Sugar:</span> <span id="out_ferment"></span></div>
                <div class="result-item"><span>Ethanol Produced:</span> <span id="out_eth_L"></span></div>
                <div class="result-item"><span>Ethanol Mass:</span> <span id="out_eth_kg"></span></div>
            </div>
            <div class="result-group">
                <h4>Economic Metrics</h4>
                <div class="result-item"><span>Daily Revenue:</span> <span id="out_rev"></span></div>
                <div class="result-item"><span>Daily Operating Cost:</span> <span id="out_cost"></span></div>
            </div>
            <div class="profit-highlight">
                Daily Profit: <span id="out_profit"></span>
            </div>
        </div>
    </div>

    <div class="chart-section"><canvas id="sensitivityChart"></canvas></div>
</div>

<script>
let myChart = null;

async function runSimulation() {
    const data = {};
    document.querySelectorAll('input').forEach(i => data[i.id] = i.value);

    const response = await fetch('/simulate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const res = await response.json();

    document.getElementById('results').style.display = 'block';
    const m = res.main;
    
    // تعبئة البيانات
    document.getElementById('out_dry').innerText = m.dry_biomass.toLocaleString() + " ton/day";
    document.getElementById('out_sugar').innerText = m.total_sugar_kg.toLocaleString() + " kg";
    document.getElementById('out_ferment').innerText = m.fermentable_sugar_kg.toLocaleString() + " kg";
    document.getElementById('out_eth_L').innerText = m.ethanol_L.toLocaleString() + " L/day";
    document.getElementById('out_eth_kg').innerText = m.ethanol_kg.toLocaleString() + " kg/day";
    document.getElementById('out_rev').innerText = "$" + m.daily_revenue.toLocaleString();
    document.getElementById('out_cost').innerText = "$" + m.total_daily_cost.toLocaleString();
    document.getElementById('out_profit').innerText = "$" + m.daily_profit.toLocaleString();

    // الرسم البياني
    const ctx = document.getElementById('sensitivityChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: res.sensitivity.map(s => (s.efficiency * 100) + '%'),
            datasets: [{
                label: 'Profit Sensitivity ($)',
                data: res.sensitivity.map(s => s.profit),
                borderColor: '#1a73e8',
                backgroundColor: 'rgba(26, 115, 232, 0.05)',
                fill: true,
                tension: 0.2
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}
</script>
</body>
</html>
